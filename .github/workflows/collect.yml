name: AI Daily Collection

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Collection mode'
        required: false
        default: 'cloud'
        type: choice
        options:
          - cloud
          - all

permissions:
  contents: read

env:
  FEISHU_BITABLE_APP_TOKEN: ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
  FEISHU_BITABLE_SOURCES_TABLE: ${{ secrets.FEISHU_BITABLE_SOURCES_TABLE }}
  FEISHU_BITABLE_FOLLOWS_TABLE: ${{ secrets.FEISHU_BITABLE_FOLLOWS_TABLE }}
  READO_D1_API_BASE_URL: ${{ secrets.READO_D1_API_BASE_URL }}
  READO_D1_API_SECRET: ${{ secrets.READO_D1_API_SECRET }}
  READO_D1_WRITE_REQUIRED: ${{ vars.READO_D1_WRITE_REQUIRED || 'true' }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
  LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'siliconflow' }}
  LLM_MODEL: ${{ vars.LLM_MODEL || 'Qwen/Qwen3-32B' }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install reado CLI
        run: npm install -g @dolphin-molt/reado

      - name: Install lark-cli (optional)
        run: npm install -g lark-cli || echo "lark-cli install failed, will use backup config"
        continue-on-error: true

      - name: Sync source configuration
        run: npx tsx scripts/sync-sources.ts
        continue-on-error: true

      - name: Collect data (cloud mode)
        run: npx tsx scripts/collect.ts --mode ${{ inputs.mode || 'cloud' }}

      - name: Generate AI summary
        if: ${{ env.ANTHROPIC_API_KEY != '' || env.SILICONFLOW_API_KEY != '' }}
        run: npx tsx scripts/summarize.ts

      - name: Skip AI summary without model key
        if: ${{ env.ANTHROPIC_API_KEY == '' && env.SILICONFLOW_API_KEY == '' }}
        run: echo "No LLM API key is configured; collection succeeded but digest generation was skipped."

      - name: Confirm D1-only collection
        run: echo "Collection writes to D1 through /api/ingest; repository data files are intentionally not committed."
