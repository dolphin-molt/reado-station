name: AI Daily Collection

on:
  schedule:
    # 早报: UTC 00:00 = 北京 08:00
    - cron: '0 0 * * *'
    # 晚报: UTC 10:00 = 北京 18:00
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Collection mode'
        required: false
        default: 'cloud'
        type: choice
        options:
          - cloud
          - all

permissions:
  contents: write

env:
  FEISHU_BITABLE_APP_TOKEN: ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
  FEISHU_BITABLE_SOURCES_TABLE: ${{ secrets.FEISHU_BITABLE_SOURCES_TABLE }}
  FEISHU_BITABLE_FOLLOWS_TABLE: ${{ secrets.FEISHU_BITABLE_FOLLOWS_TABLE }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install reado CLI
        run: npm install -g reado

      - name: Install lark-cli (optional)
        run: npm install -g lark-cli || echo "lark-cli install failed, will use backup config"
        continue-on-error: true

      - name: Sync source configuration
        run: npx tsx scripts/sync-sources.ts
        continue-on-error: true

      - name: Collect data (cloud mode)
        run: npx tsx scripts/collect.ts --mode ${{ inputs.mode || 'cloud' }}

      # v1.0: 日报由 Agent 在对话中生成，Actions 只负责采集
      # v2.0: 取消下面的注释启用自动摘要（需要 ANTHROPIC_API_KEY secret）
      # - name: Generate AI summary
      #   run: npx tsx scripts/summarize.ts
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit data
        run: |
          git config user.name "reado-station[bot]"
          git config user.email "reado-station[bot]@users.noreply.github.com"

          # Add data files
          git add data/ config/

          # Check if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Determine batch
          HOUR=$(date -u +%H)
          if [ "$HOUR" -lt 14 ]; then
            BATCH="morning"
          else
            BATCH="evening"
          fi

          DATE=$(date +%Y-%m-%d)
          git commit -m "data: ${DATE} ${BATCH} collection

          Co-Authored-By: reado-station[bot] <reado-station[bot]@users.noreply.github.com>"

          git push
