name: AI Daily Collection

on:
  schedule:
    # 早报: UTC 00:00 = 北京 08:00
    - cron: '0 0 * * *'
    # 晚报: UTC 10:00 = 北京 18:00
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Collection mode'
        required: false
        default: 'cloud'
        type: choice
        options:
          - cloud
          - all

permissions:
  contents: write

env:
  FEISHU_BITABLE_APP_TOKEN: ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
  FEISHU_BITABLE_SOURCES_TABLE: ${{ secrets.FEISHU_BITABLE_SOURCES_TABLE }}
  FEISHU_BITABLE_FOLLOWS_TABLE: ${{ secrets.FEISHU_BITABLE_FOLLOWS_TABLE }}
  READO_D1_API_BASE_URL: ${{ secrets.READO_D1_API_BASE_URL }}
  READO_D1_API_SECRET: ${{ secrets.READO_D1_API_SECRET }}
  READO_D1_WRITE_REQUIRED: ${{ vars.READO_D1_WRITE_REQUIRED }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install reado CLI
        run: npm install -g @dolphin-molt/reado

      - name: Install lark-cli (optional)
        run: npm install -g lark-cli || echo "lark-cli install failed, will use backup config"
        continue-on-error: true

      - name: Sync source configuration
        run: npx tsx scripts/sync-sources.ts
        continue-on-error: true

      - name: Collect data (cloud mode)
        run: npx tsx scripts/collect.ts --mode ${{ inputs.mode || 'cloud' }}

      # v1.0: 日报由 Agent 在对话中生成，Actions 只负责采集
      # v2.0: 取消下面的注释启用自动摘要（需要 ANTHROPIC_API_KEY secret）
      # - name: Generate AI summary
      #   run: npx tsx scripts/summarize.ts
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Merge with existing data
        run: |
          # Pull latest (local Agent may have pushed more complete data)
          git pull --rebase origin main || true

          # Determine batch path
          HOUR=$(date -u +%H)
          if [ "$HOUR" -lt 14 ]; then BATCH="morning"; else BATCH="evening"; fi
          DATE=$(date +%Y-%m-%d)
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          RAW_PATH="data/${YEAR}/${MONTH}/${DAY}/${BATCH}/raw.json"

          # Merge: if remote has more items, keep remote and add CI-only items
          npx tsx -e "
            import { readFileSync, writeFileSync } from 'fs';
            const ciPath = '${RAW_PATH}';
            try {
              const ci = JSON.parse(readFileSync(ciPath, 'utf-8'));
              // Check if there's a stashed version from rebase
              // The file we have now is post-rebase (remote version if conflict resolved)
              // Just ensure we don't reduce item count
              const ciCount = ci.items?.length || 0;
              console.log('Current items:', ciCount);
              if (ciCount === 0) {
                console.log('SKIP: zero items, nothing to commit');
                process.exit(2);
              }
            } catch(e) {
              console.log('No raw.json yet, CI will create it');
            }
          " || { echo "Skipping commit — no new data"; exit 0; }

      - name: Commit data
        run: |
          git config user.name "reado-station[bot]"
          git config user.email "reado-station[bot]@users.noreply.github.com"

          # Add data files
          git add data/ config/

          # Check if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Determine batch
          HOUR=$(date -u +%H)
          if [ "$HOUR" -lt 14 ]; then BATCH="morning"; else BATCH="evening"; fi
          DATE=$(date +%Y-%m-%d)

          ITEM_COUNT=$(cat "data/$(date +%Y)/$(date +%m)/$(date +%d)/${BATCH}/raw.json" 2>/dev/null | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).items.length)}catch{console.log(0)}})" || echo 0)

          git commit -m "data: ${DATE} ${BATCH} collection (${ITEM_COUNT} items)

          Co-Authored-By: reado-station[bot] <reado-station[bot]@users.noreply.github.com>"

          git push
