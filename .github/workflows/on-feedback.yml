name: Notify Agent on Feedback

on:
  issues:
    types: [opened]

jobs:
  notify-agent:
    # 只处理带 agent-todo 标签的 Issue
    if: contains(github.event.issue.labels.*.name, 'agent-todo')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger agent via Relay
        run: |
          # 发送后不等 agent 完成（agent 执行可能 >30s）
          # --max-time 10: 只等 relay 接收确认，不等 agent 执行完
          # 即使 relay 返回 504 也不影响——请求已经送达 bridge
          HTTP_CODE=$(curl -s -o /tmp/relay-response.txt -w "%{http_code}" \
            --max-time 10 \
            -X POST \
            "https://relay.theopcapp.com/agent/reado-mac/openclaw/dataops" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RELAY_AGENT_TOKEN }}" \
            -d "$(jq -n \
              --arg message "收到用户反馈 Issue #${{ github.event.issue.number }}：${{ github.event.issue.title }}。请加载 station-feedback 技能，处理 GitHub Issues 中 label 为 agent-todo 的反馈，按照 AGENT-PROTOCOL.md 的规则处理，处理完后在飞书群里汇报结果。" \
              '{
                message: $message,
                deliver: true,
                replyChannel: "feishu",
                replyTo: "oc_756e48ef0507c8f531b62775864e6b09"
              }'
            )" || true)
          echo "HTTP response code: $HTTP_CODE"
          cat /tmp/relay-response.txt || true
          echo ""
          # 2xx = relay 正常接收; 504 = relay 接收了但 agent 超时(正常); 其他 = 真的有问题
          if [ "$HTTP_CODE" = "000" ]; then
            echo "::warning::Relay unreachable (network error or timeout)"
          elif [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ] || [ "$HTTP_CODE" = "504" ]; then
            echo "✅ Request dispatched to agent (HTTP $HTTP_CODE)"
          else
            echo "::error::Relay returned unexpected status: $HTTP_CODE"
            exit 1
          fi
